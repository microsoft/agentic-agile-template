name: Require Copilot Review

on:
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  check-copilot-reviewed:
    name: Require Copilot Review
    runs-on: ubuntu-latest
    steps:
      - name: Check for Copilot review on current commit
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber =
              context.payload.pull_request?.number ??
              Number(context.payload.review?.pull_request_url?.split('/').pop());

            if (!prNumber) {
              core.setFailed('Could not determine PR number.');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const copilotReviewed = reviews.some(
              (r) =>
                r.user?.login === 'copilot-pull-request-reviewer' &&
                r.state === 'COMMENTED' &&
                r.commit_id === pr.head.sha
            );

            if (copilotReviewed) {
              core.info(
                `Copilot code review found for HEAD commit ${pr.head.sha}.`
              );
            } else {
              core.setFailed(
                'Copilot has not reviewed the latest commit on this PR. ' +
                'Request a review from "Copilot" in the Reviewers panel.'
              );
            }
